name: Changelog

# only trigger on pull request merged events
# on:
#  pull_request:
#    types: [ closed ]
# jobs:
#  Close-PR:
    # this job will only run if the PR has been merged
#    if: github.event.pull_request.merged == true # test on closing PR

on: [push]
jobs:
  Append-to-Changelog:
    # this job will only run if the PR has been merged
    runs-on: ubuntu-latest
    steps:
      - run: echo "$GITHUB_CONTEXT"
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
      - run: echo "$GITHUB_BODY"
        env:
          GITHUB_BODY: ${{ toJSON(github.body) }}
